<div id="regContainer" style="padding:20px; border:2px solid #0088cc; border-radius:15px; max-width: 450px; margin: auto; font-family: Arial;">
    <h2 style="color:#0088cc; text-align:center;">ចុះឈ្មោះសមាជិក មហាសិរី (MSN)</h2>
    <input type="text" id="regName" placeholder="ឈ្មោះពេញ (Full Name)" style="width:100%; padding:10px; margin:5px 0;"><br>
    <input type="text" id="regPhone" placeholder="លេខទូរស័ព្ទ (Phone)" style="width:100%; padding:10px; margin:5px 0;"><br>
    <input type="text" id="regTg" placeholder="Telegram ID (@username)" style="width:100%; padding:10px; margin:5px 0;"><br>
    <select id="regRank" style="width:100%; padding:10px; margin:5px 0;">
        <option value="សមាជិកថ្មី">សមាជិកថ្មី</option>
        <option value="ដៃគូអាជីវកម្ម">ដៃគូអាជីវកម្ម</option>
    </select>
    <button onclick="submitRegistration()" style="width:100%; padding:12px; background:#0088cc; color:white; border:none; border-radius:5px; font-weight:bold; margin-top:10px;">ចុះឈ្មោះបញ្ជាក់ខ្លួនឯង</button>
</div>

<script>
async function submitRegistration() {
    const data = {
        name: document.getElementById('regName').value,
        phone: document.getElementById('regPhone').value,
        tg: document.getElementById('regTg').value,
        rank: document.getElementById('regRank').value,
        timestamp: new Date().toLocaleString()
    };
    
    // ផ្ញើទៅ Google Sheet
    await fetch("https://script.google.com/macros/s/AKfycbym4qdUczM6ngYEicOPkpvLGv74ewLd_2xcZ0818Ba1aHBDBhp5XUxHRm53dkqzohJIEg/exec", {
        method: "POST", mode: "no-cors", body: JSON.stringify(data)
    });
    
    // ជូនដំណឹងទៅ Telegram Admin
    let msg = `🎉 សមាជិកថ្មី! %0Aឈ្មោះ: ${data.name} %0Aតួនាទី: ${data.rank} %0ATelegram: ${data.tg}`;
    fetch(`https://api.telegram.org/bot8771623252:AAEJ9n9I0-oIeKDrtoSzlRPfhzG4U7gA-oY/sendMessage?chat_id=YOUR_ADMIN_ID&text=${msg}`);
    
    alert("ចុះឈ្មោះជោគជ័យ! ទិន្នន័យត្រូវបានបញ្ជូនទៅប្រព័ន្ធហើយ។");
}
</script>
